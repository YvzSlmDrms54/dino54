<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino54 - Dinozor Oyunu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      user-select: none;
    }
    h1 { font-size: 1.4rem; color: #555; margin-bottom: 12px; letter-spacing: 2px; }
    #gameContainer {
      position: relative;
      width: 800px;
      max-width: 98vw;
    }
    canvas {
      background: #fff;
      border: 2px solid #ccc;
      display: block;
      width: 100%;
    }
    #ui {
      display: flex;
      justify-content: space-between;
      padding: 6px 4px 0;
      font-size: 0.85rem;
      color: #555;
    }
    #instructions {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>DINO54</h1>
  <div id="gameContainer">
    <canvas id="canvas" width="800" height="250"></canvas>
    <div id="ui">
      <span id="scoreDisplay">SKOR: 0</span>
      <span id="hiDisplay">EN İYİ: 0</span>
    </div>
    <div id="instructions">BOŞLUK / ↑ ZIPLAMA &nbsp;|&nbsp; ↓ EĞILME &nbsp;|&nbsp; MOBİL: DOKUN</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const GROUND = H - 50;

    const scoreEl = document.getElementById('scoreDisplay');
    const hiEl = document.getElementById('hiDisplay');

    let hiScore = 0;
    let state = 'idle'; // idle | running | dead
    let score = 0, frame = 0, speed = 5;
    let animId;

    // --- Dino ---
    const dino = {
      x: 80, y: GROUND, w: 44, h: 52,
      vy: 0, gravity: 0.8,
      ducking: false,
      legFrame: 0,
      get top() { return this.y - (this.ducking ? 28 : this.h); },
      get bottom() { return this.y; },
      get right() { return this.x + this.w - 6; },
      get left() { return this.x + 6; }
    };

    function dinoJump() {
      if (dino.top >= GROUND - 2) {
        dino.vy = -16;
        dino.ducking = false;
      }
    }

    function dinoDuck(on) {
      if (dino.top >= GROUND - 2) dino.ducking = on;
    }

    // --- Obstacles ---
    let obstacles = [];
    let nextObstacle = 80;

    function spawnObstacle() {
      const types = ['cactusS', 'cactusL', 'cactusGroup', 'bird'];
      const t = types[Math.floor(Math.random() * types.length)];
      if (t === 'bird') {
        const birdY = [GROUND - 80, GROUND - 50, GROUND - 110][Math.floor(Math.random() * 3)];
        obstacles.push({ type: 'bird', x: W + 20, y: birdY, w: 46, h: 34, wingUp: true, wingTimer: 0 });
      } else if (t === 'cactusGroup') {
        obstacles.push({ type: 'cactus', x: W + 20, y: GROUND, w: 72, h: 60, count: 3 });
      } else if (t === 'cactusL') {
        obstacles.push({ type: 'cactus', x: W + 20, y: GROUND, w: 28, h: 70, count: 1 });
      } else {
        obstacles.push({ type: 'cactus', x: W + 20, y: GROUND, w: 22, h: 50, count: 1 });
      }
    }

    // --- Clouds ---
    let clouds = [];
    function spawnCloud() {
      clouds.push({ x: W + 20, y: 30 + Math.random() * 50, w: 60 + Math.random() * 60 });
    }
    let nextCloud = 120;

    // --- Stars (night mode) ---
    let stars = [];
    for (let i = 0; i < 30; i++) stars.push({ x: Math.random() * W, y: Math.random() * (GROUND - 60) });

    // --- Ground segments ---
    let groundX = 0;

    // ======= DRAW FUNCTIONS =======

    function drawBackground() {
      const night = score > 500 && Math.floor(score / 500) % 2 === 1;
      ctx.fillStyle = night ? '#1a1a2e' : '#fff';
      ctx.fillRect(0, 0, W, H);

      if (night) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, 1.5, 0, Math.PI*2); ctx.fill(); });
      }

      // ground line
      ctx.fillStyle = night ? '#444' : '#ccc';
      ctx.fillRect(0, GROUND, W, 2);

      // ground texture
      ctx.fillStyle = night ? '#333' : '#e0e0e0';
      for (let i = 0; i < 10; i++) {
        const gx = ((groundX + i * 90) % W);
        ctx.fillRect(gx, GROUND + 4, 40, 3);
        ctx.fillRect((gx + 50) % W, GROUND + 10, 20, 2);
      }

      // clouds
      ctx.fillStyle = night ? '#2a2a4a' : '#e8e8e8';
      clouds.forEach(c => {
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.w / 2, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x - c.w * 0.15, c.y + 4, c.w * 0.3, 9, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x + c.w * 0.18, c.y + 5, c.w * 0.28, 8, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawDino() {
      const night = score > 500 && Math.floor(score / 500) % 2 === 1;
      const col = night ? '#b0e0b0' : '#535353';
      const x = dino.x, y = dino.y;

      if (dino.ducking) {
        // ducked dino
        ctx.fillStyle = col;
        ctx.fillRect(x, y - 28, 56, 28); // body
        // head
        ctx.fillRect(x + 32, y - 40, 24, 18);
        ctx.fillStyle = '#fff';
        ctx.fillRect(x + 48, y - 36, 5, 5);
        ctx.fillStyle = col;
        ctx.fillRect(x + 50, y - 34, 2, 2);
        // legs running
        const lf = Math.floor(dino.legFrame / 6) % 2;
        ctx.fillStyle = col;
        if (lf === 0) {
          ctx.fillRect(x + 6, y - 14, 10, 14);
          ctx.fillRect(x + 22, y - 8, 10, 8);
        } else {
          ctx.fillRect(x + 6, y - 8, 10, 8);
          ctx.fillRect(x + 22, y - 14, 10, 14);
        }
        return;
      }

      // body
      ctx.fillStyle = col;
      ctx.fillRect(x + 4, y - dino.h + 16, 36, 30);
      // tail
      ctx.fillRect(x, y - dino.h + 28, 12, 10);
      ctx.fillRect(x - 6, y - dino.h + 36, 10, 8);
      // neck+head
      ctx.fillRect(x + 28, y - dino.h, 24, 26);
      // eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 44, y - dino.h + 5, 7, 7);
      ctx.fillStyle = col;
      ctx.fillRect(x + 46, y - dino.h + 7, 3, 3);
      // mouth
      ctx.fillStyle = col;
      ctx.fillRect(x + 50, y - dino.h + 18, 6, 4);
      // arms
      ctx.fillStyle = col;
      ctx.fillRect(x + 28, y - dino.h + 26, 10, 6);

      // legs
      const onGround = dino.top >= GROUND - 4;
      const lf = Math.floor(dino.legFrame / 6) % 2;
      ctx.fillStyle = col;
      if (onGround) {
        if (lf === 0) {
          ctx.fillRect(x + 10, y - 22, 10, 22);
          ctx.fillRect(x + 24, y - 14, 10, 14);
          ctx.fillRect(x + 8, y - 4, 14, 4);
        } else {
          ctx.fillRect(x + 10, y - 14, 10, 14);
          ctx.fillRect(x + 24, y - 22, 10, 22);
          ctx.fillRect(x + 22, y - 4, 14, 4);
        }
      } else {
        // jumping pose
        ctx.fillRect(x + 10, y - 18, 10, 18);
        ctx.fillRect(x + 24, y - 12, 10, 12);
      }
    }

    function drawCactus(o) {
      const col = '#2d5a27';
      const cx = o.x, cy = o.y, cw = o.w, ch = o.h;
      if (o.count >= 3) {
        for (let i = 0; i < 3; i++) {
          const ox = cx + i * (cw / 3);
          const ow = cw / 3 - 4;
          const oh = ch - i * 8;
          ctx.fillStyle = col;
          ctx.fillRect(ox + ow * 0.3, cy - oh, ow * 0.4, oh);
          ctx.fillRect(ox, cy - oh * 0.6, ow * 0.35, 12);
          ctx.fillRect(ox + ow * 0.65, cy - oh * 0.5, ow * 0.35, 12);
          ctx.fillRect(ox, cy - oh * 0.6 - 8, ow * 0.35, 8);
          ctx.fillRect(ox + ow * 0.65, cy - oh * 0.5 - 8, ow * 0.35, 8);
        }
      } else {
        ctx.fillStyle = col;
        ctx.fillRect(cx + cw * 0.3, cy - ch, cw * 0.4, ch);
        ctx.fillRect(cx, cy - ch * 0.6, cw * 0.35, 14);
        ctx.fillRect(cx + cw * 0.65, cy - ch * 0.5, cw * 0.35, 14);
        ctx.fillRect(cx, cy - ch * 0.6 - 10, cw * 0.35, 10);
        ctx.fillRect(cx + cw * 0.65, cy - ch * 0.5 - 10, cw * 0.35, 10);
      }
    }

    function drawBird(o) {
      const night = score > 500 && Math.floor(score / 500) % 2 === 1;
      const col = night ? '#c084fc' : '#535353';
      ctx.fillStyle = col;
      // body
      ctx.fillRect(o.x + 8, o.y + 10, 28, 14);
      // head
      ctx.fillRect(o.x + 30, o.y + 4, 16, 12);
      // beak
      ctx.fillRect(o.x + 44, o.y + 8, 8, 5);
      // eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(o.x + 38, o.y + 6, 5, 5);
      ctx.fillStyle = col;
      ctx.fillRect(o.x + 40, o.y + 8, 2, 2);
      // wings
      ctx.fillStyle = col;
      if (o.wingUp) {
        ctx.fillRect(o.x, o.y, 22, 10);
        ctx.fillRect(o.x + 16, o.y + 2, 14, 8);
      } else {
        ctx.fillRect(o.x, o.y + 20, 22, 10);
        ctx.fillRect(o.x + 16, o.y + 22, 14, 8);
      }
    }

    function drawObstacles() {
      obstacles.forEach(o => {
        if (o.type === 'cactus') drawCactus(o);
        else drawBird(o);
      });
    }

    function drawScore() {
      const night = score > 500 && Math.floor(score / 500) % 2 === 1;
      scoreEl.style.color = night ? '#b0e0b0' : '#555';
      hiEl.style.color = scoreEl.style.color;
      scoreEl.textContent = 'SKOR: ' + Math.floor(score);
      hiEl.textContent = 'EN İYİ: ' + Math.floor(hiScore);
    }

    function drawOverlay(text, sub) {
      const night = score > 500 && Math.floor(score / 500) % 2 === 1;
      ctx.fillStyle = night ? 'rgba(26,26,46,0.7)' : 'rgba(255,255,255,0.7)';
      ctx.fillRect(W/2 - 160, H/2 - 50, 320, 90);
      ctx.fillStyle = night ? '#b0e0b0' : '#535353';
      ctx.font = 'bold 22px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(text, W/2, H/2 - 10);
      ctx.font = '14px Courier New';
      ctx.fillText(sub, W/2, H/2 + 18);
      ctx.textAlign = 'left';
    }

    // ======= COLLISION =======
    function hitBox(o) {
      if (o.type === 'cactus') {
        const pad = 8;
        return { l: o.x + pad, r: o.x + o.w - pad, t: o.y - o.h + pad, b: o.y };
      } else {
        return { l: o.x + 4, r: o.x + o.w - 4, t: o.y + 2, b: o.y + o.h - 2 };
      }
    }

    function checkCollision() {
      const dl = dino.left, dr = dino.right, dt = dino.top, db = dino.bottom;
      for (const o of obstacles) {
        const h = hitBox(o);
        if (dr > h.l && dl < h.r && db > h.t && dt < h.b) return true;
      }
      return false;
    }

    // ======= UPDATE =======
    function update() {
      frame++;
      score += 0.1 + speed * 0.02;
      speed = 5 + Math.floor(score / 100) * 0.3;
      if (speed > 15) speed = 15;

      // dino physics
      dino.vy += dino.gravity;
      dino.y += dino.vy;
      if (dino.y >= GROUND) { dino.y = GROUND; dino.vy = 0; }
      if (dino.top < GROUND) dino.legFrame++;

      // clouds
      clouds.forEach(c => c.x -= speed * 0.3);
      clouds = clouds.filter(c => c.x > -120);
      nextCloud--;
      if (nextCloud <= 0) { spawnCloud(); nextCloud = 80 + Math.random() * 100; }

      // ground
      groundX = (groundX - speed) % W;

      // obstacles
      obstacles.forEach(o => {
        o.x -= speed;
        if (o.type === 'bird') {
          o.wingTimer++;
          if (o.wingTimer % 12 === 0) o.wingUp = !o.wingUp;
        }
      });
      obstacles = obstacles.filter(o => o.x > -150);
      nextObstacle -= speed;
      if (nextObstacle <= 0) {
        spawnObstacle();
        nextObstacle = 250 + Math.random() * 300 - Math.min(score * 0.3, 150);
        if (nextObstacle < 100) nextObstacle = 100;
      }

      if (checkCollision()) {
        if (score > hiScore) hiScore = score;
        state = 'dead';
      }
    }

    // ======= GAME LOOP =======
    function loop() {
      drawBackground();
      drawObstacles();
      drawDino();
      drawScore();

      if (state === 'idle') {
        drawOverlay('DINO54', 'Başlamak için BOŞLUK / Dokun');
      } else if (state === 'running') {
        update();
      } else if (state === 'dead') {
        drawOverlay('OYUN BİTTİ', 'Tekrar oynamak için BOŞLUK / Dokun');
      }

      animId = requestAnimationFrame(loop);
    }

    function startGame() {
      score = 0; frame = 0; speed = 5;
      obstacles = []; clouds = []; groundX = 0;
      nextObstacle = 200; nextCloud = 80;
      dino.y = GROUND; dino.vy = 0; dino.ducking = false; dino.legFrame = 0;
      state = 'running';
    }

    function handleAction() {
      if (state === 'idle' || state === 'dead') startGame();
      else if (state === 'running') dinoJump();
    }

    // keyboard
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleAction(); }
      if (e.code === 'ArrowDown') { e.preventDefault(); dinoDuck(true); }
    });
    document.addEventListener('keyup', e => {
      if (e.code === 'ArrowDown') dinoDuck(false);
    });

    // touch / click
    let touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      touchStartY = e.touches[0].clientY;
      handleAction();
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (dy > 30) dinoDuck(false);
    }, { passive: false });
    canvas.addEventListener('mousedown', () => handleAction());

    // swipe down to duck
    let mouseDown = false;
    document.addEventListener('mousedown', () => mouseDown = true);
    document.addEventListener('mouseup', () => { mouseDown = false; dinoDuck(false); });

    loop();
  </script>
</body>
</html>
